<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Família</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #F0F0F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 60px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      color: #1c1c1e;
    }

    h1.page-title {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #1c1c1e;
      margin-bottom: 36px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 160px);
      gap: 12px;
      width: fit-content;
    }

    .widget {
      background: #F9F9F9;
      border-radius: 22px;
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      min-height: 160px;
      position: relative;
    }

    .widget.large {
      grid-column: span 2;
      min-height: 160px;
      flex-direction: row;
      align-items: stretch;
    }

    /* ── Clock ── */
    .clock-flag { font-size: 28px; line-height: 1; margin-bottom: auto; }

    .clock-city {
      font-size: 13px;
      font-weight: 500;
      color: #1c1c1e;
      margin-top: 12px;
      margin-bottom: 2px;
    }

    .clock-time {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #1c1c1e;
    }

    /* ── Bill widget ── */
    .bill-left {
      display: flex;
      flex-direction: column;
      min-width: 110px;
      padding-right: 16px;
    }

    .bill-icon { font-size: 28px; line-height: 1; margin-bottom: auto; }

    .bill-day-name {
      font-size: 13px;
      font-weight: 500;
      color: #1c1c1e;
      margin-top: 12px;
      margin-bottom: 2px;
    }

    .bill-day-num {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #1c1c1e;
    }

    .bill-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 16px;
    }

    .bill-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #ebebeb;
    }

    .bill-row:last-child { border-bottom: none; }

    .bill-row-days {
      font-size: 15px;
      font-weight: 700;
      color: #1c1c1e;
      min-width: 24px;
      text-align: right;
    }

    .bill-row-name {
      font-size: 15px;
      font-weight: 400;
      color: #1c1c1e;
    }

    .no-bills-right {
      font-size: 13px;
      color: #c7c7cc;
      text-align: center;
      padding: 12px 0;
    }

    /* ── Tracker ── */
    .tracker-icon { font-size: 28px; line-height: 1; margin-bottom: auto; }

    .tracker-day-name {
      font-size: 13px;
      font-weight: 500;
      color: #1c1c1e;
      margin-top: 12px;
      margin-bottom: 2px;
    }

    .tracker-day-num {
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #1c1c1e;
    }

    .tracker-plus {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: #ebebeb;
      border: none;
      color: #8e8e93;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .tracker-plus:hover { background: #dcdcdc; color: #1c1c1e; }
    .tracker-overdue .tracker-day-num { color: #ff3b30; }
    .tracker-due     .tracker-day-num { color: #ff9500; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 24px;
      padding: 28px 24px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }

    .modal h2 { font-size: 17px; font-weight: 700; color: #1c1c1e; }

    .modal input {
      background: #f2f2f7;
      border: none;
      border-radius: 12px;
      color: #1c1c1e;
      padding: 12px 14px;
      font-size: 15px;
      font-family: inherit;
      width: 100%;
      outline: none;
    }

    .modal input::placeholder { color: #c7c7cc; }
    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }

    .btn-cancel, .btn-save {
      flex: 1;
      padding: 13px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .btn-cancel { background: #f2f2f7; color: #8e8e93; }
    .btn-save   { background: #1c1c1e; color: #fff; }

    .bills-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .bill-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f2f2f7;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
    }

    .bill-item-info { display: flex; flex-direction: column; gap: 2px; }
    .bill-item-name { font-weight: 600; color: #1c1c1e; }
    .bill-item-date { color: #8e8e93; font-size: 11px; }

    .bill-delete {
      background: none;
      border: none;
      color: #ff3b30;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      opacity: 0.5;
      transition: opacity 0.15s;
    }

    .bill-delete:hover { opacity: 1; }

    @media (max-width: 380px) {
      .grid { grid-template-columns: repeat(2, 1fr); width: calc(100vw - 40px); }
    }
  </style>
</head>
<body>

<h1 class="page-title">Família</h1>

<div class="grid">
  <div class="widget" id="clock-ca">
    <div class="clock-flag">🇺🇸</div>
    <div class="clock-city">California</div>
    <div class="clock-time" id="time-ca">--:--</div>
  </div>

  <div class="widget" id="clock-rio">
    <div class="clock-flag">🇧🇷</div>
    <div class="clock-city">Rio de Janeiro</div>
    <div class="clock-time" id="time-rio">--:--</div>
  </div>

  <div class="widget large" id="widget-bill">
    <div class="bill-left">
      <div class="bill-icon">💸</div>
      <div id="bill-next-day-name" class="bill-day-name">—</div>
      <div id="bill-next-day-num"  class="bill-day-num">—</div>
    </div>
    <div class="bill-right" id="bill-list-inline"></div>
  </div>

  <div class="widget" id="widget-plants">
    <div class="tracker-icon">🪴</div>
    <div class="tracker-day-name" id="plants-day-name">—</div>
    <div class="tracker-day-num"  id="plants-day-num">—</div>
    <button class="tracker-plus" onclick="markToday('plants')" title="Regou hoje">+</button>
  </div>

  <div class="widget" id="widget-candle">
    <div class="tracker-icon">🕯️</div>
    <div class="tracker-day-name" id="candle-day-name">—</div>
    <div class="tracker-day-num"  id="candle-day-num">—</div>
    <button class="tracker-plus" onclick="markToday('candle')" title="Acendeu hoje">+</button>
  </div>
</div>

<!-- Modal contas -->
<div class="modal-overlay" id="bill-modal">
  <div class="modal">
    <h2>💸 Gerenciar Contas</h2>
    <div class="bills-list" id="bills-list"></div>
    <hr style="border: none; border-top: 1px solid #f2f2f7;" />
    <input type="text" id="bill-name" placeholder="Nome da conta (ex: Aluguel)" />
    <input type="number" id="bill-day" placeholder="Dia do mês (ex: 10)" min="1" max="31" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save"   onclick="addBill()">Adicionar</button>
    </div>
  </div>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ── Data ─────────────────────────────────────────────────────────────────────
const DEFAULT_BILLS = [
  { name: 'Água',       day: 6  },
  { name: 'Transporte', day: 10 },
  { name: 'Faculdade',  day: 10 },
  { name: 'Escola',     day: 15 },
  { name: 'Luz',        day: 20 },
];

let bills = load('bills', null);
if (!bills || !Array.isArray(bills) || bills.some(b => !b.day)) {
  bills = DEFAULT_BILLS;
  save('bills', bills);
}

let trackers = load('trackers', null) || {};
if (!trackers.plants) trackers.plants = '2026-06-19';
if (!trackers.candle) trackers.candle = '2026-06-20';
save('trackers', trackers);

// ── Constants ────────────────────────────────────────────────────────────────
const DAY_PT = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

// ── Clocks ───────────────────────────────────────────────────────────────────
function getTime(tz) {
  try {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false
    }).formatToParts(new Date());
    const h = parts.find(p => p.type === 'hour').value;
    const m = parts.find(p => p.type === 'minute').value;
    // Intl may return '24' for midnight, normalize to '00'
    return `${h === '24' ? '00' : h}:${m}`;
  } catch (e) {
    return '--:--';
  }
}

function updateClocks() {
  document.getElementById('time-ca').textContent  = getTime('America/Los_Angeles');
  document.getElementById('time-rio').textContent = getTime('America/Sao_Paulo');
}

updateClocks();
setTimeout(function tick() {
  updateClocks();
  setTimeout(tick, (60 - new Date().getSeconds()) * 1000);
}, (60 - new Date().getSeconds()) * 1000);

// ── Helpers ──────────────────────────────────────────────────────────────────
function todayLocal() {
  const now = new Date();
  const y   = now.getFullYear();
  const m   = String(now.getMonth() + 1).padStart(2, '0');
  const d   = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Bills ────────────────────────────────────────────────────────────────────
function nextDueDate(day) {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const y = now.getFullYear(), m = now.getMonth();
  let d = new Date(y, m, day);
  if (d < now) d = new Date(y, m + 1, day);
  return d;
}

function billsSorted() {
  return [...bills]
    .map(b => ({ ...b, nextDate: nextDueDate(b.day) }))
    .sort((a, b) => a.nextDate - b.nextDate);
}

function renderBills() {
  const sorted = billsSorted();
  const nameEl = document.getElementById('bill-next-day-name');
  const numEl  = document.getElementById('bill-next-day-num');
  const listEl = document.getElementById('bill-list-inline');

  if (!sorted.length) {
    nameEl.textContent = '—';
    numEl.textContent  = '—';
    listEl.innerHTML   = '<p class="no-bills-right">Nenhuma conta cadastrada</p>';
    return;
  }

  const next = sorted[0];
  nameEl.textContent = DAY_PT[next.nextDate.getDay()];
  numEl.textContent  = next.nextDate.getDate();

  const now = new Date(); now.setHours(0, 0, 0, 0);
  listEl.innerHTML = sorted.slice(0, 3).map(b => {
    const diff  = Math.round((b.nextDate - now) / 86400000);
    const label = diff === 0 ? 'hoje' : String(diff);
    return `<div class="bill-row">
      <span class="bill-row-days">${escHtml(label)}</span>
      <span class="bill-row-name">${escHtml(b.name)}</span>
    </div>`;
  }).join('');
}

function renderBillsList() {
  const list = document.getElementById('bills-list');
  if (!bills.length) {
    list.innerHTML = '<p style="color:#c7c7cc;font-size:13px;text-align:center;padding:8px 0">Nenhuma conta cadastrada</p>';
    return;
  }
  list.innerHTML = billsSorted().map(b => {
    const idx = bills.findIndex(x => x.name === b.name && x.day === b.day);
    return `<div class="bill-item">
      <div class="bill-item-info">
        <div class="bill-item-name">${escHtml(b.name)}</div>
        <div class="bill-item-date">Todo dia ${b.day}</div>
      </div>
      <button class="bill-delete" onclick="deleteBill(${idx})">×</button>
    </div>`;
  }).join('');
}

function addBill() {
  const name = document.getElementById('bill-name').value.trim();
  const day  = parseInt(document.getElementById('bill-day').value);
  if (!name || isNaN(day) || day < 1 || day > 31) return;
  bills.push({ name, day });
  save('bills', bills);
  document.getElementById('bill-name').value = '';
  document.getElementById('bill-day').value  = '';
  renderBills();
  renderBillsList();
}

function deleteBill(i) {
  bills.splice(i, 1);
  save('bills', bills);
  renderBills();
  renderBillsList();
}

document.getElementById('bill-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function closeModal() { document.getElementById('bill-modal').classList.remove('open'); }

// ── Trackers ─────────────────────────────────────────────────────────────────
const TRACKER_CONFIG = {
  plants: { dueAfter: 3, overAfter: 4 },
  candle: { dueAfter: 7, overAfter: 10 },
};

function renderTracker(key) {
  const cfg    = TRACKER_CONFIG[key];
  const dateStr = trackers[key];
  const nameEl = document.getElementById(key + '-day-name');
  const numEl  = document.getElementById(key + '-day-num');
  const widget = document.getElementById('widget-' + key);

  widget.classList.remove('tracker-overdue', 'tracker-due');

  if (!dateStr) {
    nameEl.textContent = 'Sem registro';
    numEl.textContent  = '—';
    widget.classList.add('tracker-due');
    return;
  }

  const last = new Date(dateStr + 'T00:00:00');
  const now  = new Date(); now.setHours(0, 0, 0, 0);
  const days = Math.round((now - last) / 86400000);

  nameEl.textContent = DAY_PT[last.getDay()];
  numEl.textContent  = last.getDate();

  if      (days >= cfg.overAfter) widget.classList.add('tracker-overdue');
  else if (days >= cfg.dueAfter)  widget.classList.add('tracker-due');
}

function markToday(key) {
  trackers[key] = todayLocal();
  save('trackers', trackers);
  renderTracker(key);
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderBills();
renderTracker('plants');
renderTracker('candle');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Família</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      color: #1c1c1e;
      display: flex;
      flex-direction: column;
    }

    /* ── Clocks ── */
    .clocks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #fff;
    }

    .clock-tile {
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .clock-tile:first-child { border-right: 1px solid #ebebeb; }

    .clock-flag { font-size: 24px; margin-bottom: 10px; }

    .clock-city {
      font-size: 12px;
      font-weight: 500;
      color: #8e8e93;
      letter-spacing: 0.02em;
    }

    .clock-time {
      font-size: 38px;
      font-weight: 500;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #1c1c1e;
    }

    /* ── Sections ── */
    .section {
      flex: 1;
      padding: 40px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      min-height: 220px;
      cursor: pointer;
      transition: filter 0.15s;
      position: relative;
    }

    .section:active { filter: brightness(0.95); }

    .section-bills   { background: #F07868; }
    .section-plants  { background: #F0A090; }
    .section-candle  { background: #F5D4A8; }

    .section-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .section-icon svg {
      width: 32px;
      height: 32px;
      fill: #1c1c1e;
    }

    .section-text { display: flex; flex-direction: column; gap: 6px; }

    .section-label {
      font-size: 15px;
      font-weight: 500;
      color: rgba(28,28,30,0.65);
      letter-spacing: 0.01em;
    }

    .section-label span {
      color: rgba(28,28,30,0.9);
      font-weight: 600;
    }

    .section-date {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #1c1c1e;
    }

    .section-sub {
      font-size: 13px;
      font-weight: 500;
      color: rgba(28,28,30,0.5);
      margin-top: 2px;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      align-self: center;
      margin-bottom: 6px;
    }

    .modal h2 { font-size: 18px; font-weight: 700; color: #1c1c1e; }

    .modal-mark-btn {
      background: #1c1c1e;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
    }

    .modal-mark-btn:hover { opacity: 0.85; }

    .modal-cancel {
      background: #f2f2f7;
      color: #8e8e93;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      width: 100%;
    }

    .bills-list-modal {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 240px;
      overflow-y: auto;
    }

    .bill-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f2f2f7;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .bill-item-left { display: flex; flex-direction: column; gap: 2px; }
    .bill-item-name { font-size: 15px; font-weight: 600; color: #1c1c1e; }
    .bill-item-day  { font-size: 12px; color: #8e8e93; }

    .bill-delete {
      background: none;
      border: none;
      color: #ff3b30;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.5;
      padding: 0 4px;
    }

    .bill-delete:hover { opacity: 1; }

    .add-row { display: flex; gap: 10px; }

    .modal input {
      background: #f2f2f7;
      border: none;
      border-radius: 12px;
      color: #1c1c1e;
      padding: 13px 14px;
      font-size: 15px;
      font-family: inherit;
      width: 100%;
      outline: none;
    }

    .modal input::placeholder { color: #c7c7cc; }

    .modal-add-btn {
      background: #1c1c1e;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>


<!-- Bills -->
<div class="section section-bills" onclick="openBillsModal()">
  <div class="section-icon">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="72" height="72" rx="36" fill="black" fill-opacity="0.08"/><path d="M24.7368 46.6455V26.8306C24.7368 23.917 26.2661 22.3745 29.1665 22.3745H43.2466C46.1338 22.3745 47.6763 23.917 47.6763 26.8306V46.6455C47.6763 49.5591 46.1338 51.1147 43.2466 51.1147H29.1665C26.2661 51.1147 24.7368 49.5591 24.7368 46.6455ZM27.6768 46.395C27.6768 47.5552 28.2568 48.1748 29.4697 48.1748H42.9434C44.1562 48.1748 44.7363 47.5552 44.7363 46.395V27.0811C44.7363 25.9341 44.1562 25.3013 42.9434 25.3013H29.4697C28.2568 25.3013 27.6768 25.9341 27.6768 27.0811V46.395ZM31.5264 30.6538C31.0122 30.6538 30.6562 30.2715 30.6562 29.7969C30.6562 29.3223 31.0122 28.9531 31.5264 28.9531H40.9131C41.4009 28.9531 41.7568 29.3223 41.7568 29.7969C41.7568 30.2715 41.4009 30.6538 40.9131 30.6538H31.5264ZM31.5264 35.0967C31.0122 35.0967 30.6562 34.7144 30.6562 34.2266C30.6562 33.752 31.0122 33.3828 31.5264 33.3828H40.9131C41.4009 33.3828 41.7568 33.752 41.7568 34.2266C41.7568 34.7144 41.4009 35.0967 40.9131 35.0967H31.5264ZM31.5264 39.5264C31.0122 39.5264 30.6562 39.1572 30.6562 38.6958C30.6562 38.208 31.0122 37.8257 31.5264 37.8257H36.1406C36.6284 37.8257 36.9844 38.208 36.9844 38.6958C36.9844 39.1572 36.6284 39.5264 36.1406 39.5264H31.5264Z" fill="black"/></svg>
  </div>
  <div class="section-text">
    <div class="section-label">Próxima conta <span id="bill-name-inline"></span></div>
    <div class="section-date" id="bill-date-display">—</div>
  </div>
</div>

<!-- Plants -->
<div class="section section-plants" onclick="openTrackerModal('plants')">
  <div class="section-icon">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="72" height="72" rx="36" fill="black" fill-opacity="0.08"/><path d="M24.1304 25.6177C24.3677 24.5894 25.3301 24.4312 25.9893 25.1035C27.9141 27.1074 30.2607 27.2524 32.3438 27.2524C34.3081 27.2524 36.8394 26.6987 39.0015 26.6987C45.6064 26.6987 50.0889 30.0474 50.0889 36.5337C50.0889 37.1533 50.0493 37.7598 49.9834 38.1289C49.8779 38.7222 49.2056 38.9595 48.6387 38.4585C42.9829 33.2773 36.9053 37.272 32.3174 32.46C31.9614 32.104 31.5396 32.394 31.6978 32.8027C33.8862 38.7222 42.8906 35.3867 48.8364 40.9106C50.2339 42.2026 52.9497 45.459 52.9497 47.3179C52.9497 48.5571 52.0796 49.48 51.0117 49.48C50.4712 49.48 49.9966 49.1899 49.7856 48.5308C49.1133 46.3818 48.5332 44.7734 47.4653 43.2441C46.0942 44.7207 43.4443 46.6851 38.9619 46.6851C29.7598 46.6851 23.7349 40.0405 23.7349 29.9683C23.7349 28.7554 23.8403 26.9624 24.1304 25.6177Z" fill="black"/></svg>
  </div>
  <div class="section-text">
    <div class="section-label">Próxima rega</div>
    <div class="section-date" id="plants-date-display">—</div>
    <div class="section-sub" id="plants-sub"></div>
  </div>
</div>

<!-- Candle -->
<div class="section section-candle" onclick="openTrackerModal('candle')">
  <div class="section-icon">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="72" height="72" rx="36" fill="black" fill-opacity="0.08"/><path d="M34.4531 50.126C28.0063 50.126 23.7349 46.4082 23.7349 40.8184C23.7349 35.8877 26.0552 34.4507 26.0552 31.3789C26.0552 30.6802 25.9497 30.0078 25.9497 29.5596C25.9497 28.8081 26.4111 28.3335 27.0967 28.3335C28.2437 28.3335 29.4829 29.2036 30.2871 30.8911C30.3267 30.7065 30.3398 30.522 30.3398 30.3242C30.3135 27.8325 28.8633 25.7759 27.189 23.7588C26.8857 23.3896 26.7012 22.9678 26.7012 22.5591C26.7012 21.5044 27.6504 20.9507 29.0874 20.9507C36.1538 20.9507 46.4502 25.9868 46.4502 37.9971C46.4502 45.2744 41.6514 50.126 34.4531 50.126ZM34.7827 45.7886C37.8018 45.7886 39.4102 43.6265 39.4102 40.9897C39.4102 38.3003 37.8809 35.5186 35.0464 34.2529C34.8618 34.1738 34.6904 34.2793 34.73 34.5034C34.9805 36.4678 34.7695 38.3003 34.1104 39.3682C33.8071 38.564 33.438 37.9048 32.8711 37.3774C32.6997 37.2324 32.5283 37.3247 32.5151 37.5093C32.3042 39.1572 30.7222 39.8823 30.7222 42.1499C30.7222 44.3384 32.3306 45.7886 34.7827 45.7886Z" fill="black"/></svg>
  </div>
  <div class="section-text">
    <div class="section-label">Próxima vela</div>
    <div class="section-date" id="candle-date-display">—</div>
    <div class="section-sub" id="candle-sub"></div>
  </div>
</div>

<!-- Bills modal -->
<div class="modal-overlay" id="modal-bills">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>💳 Contas</h2>
    <div class="bills-list-modal" id="bills-list-modal"></div>
    <hr style="border:none;border-top:1px solid #ebebeb" />
    <div class="add-row">
      <input type="text"   id="new-bill-name" placeholder="Nome" />
      <input type="number" id="new-bill-day"  placeholder="Dia" min="1" max="31" style="width:80px;flex-shrink:0" />
      <button class="modal-add-btn" onclick="addBill()">+</button>
    </div>
    <button class="modal-cancel" onclick="closeModal()">Fechar</button>
  </div>
</div>

<!-- Tracker modal -->
<div class="modal-overlay" id="modal-tracker">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="tracker-modal-title"></h2>
    <button class="modal-mark-btn" id="tracker-mark-btn" onclick="markTrackerToday()"></button>
    <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script>
// ── Storage ───────────────────────────────────────────────────────────────────
const load = (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ── Data ─────────────────────────────────────────────────────────────────────
const DEFAULT_BILLS = [
  { name: 'Água',       day: 6  },
  { name: 'Transporte', day: 10 },
  { name: 'Faculdade',  day: 10 },
  { name: 'Escola',     day: 15 },
  { name: 'Luz',        day: 20 },
];

let bills = load('bills', null);
if (!bills || !Array.isArray(bills) || bills.some(b => !b.day)) {
  bills = DEFAULT_BILLS;
  save('bills', bills);
}

let trackers = load('trackers', null) || {};
if (!trackers.plants) trackers.plants = '2026-06-19';
if (!trackers.candle) trackers.candle = '2026-06-20';
save('trackers', trackers);

// ── Constants ─────────────────────────────────────────────────────────────────
const DAY_PT = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const TRACKER_INTERVAL = { plants: 4, candle: 7 };

// ── Clocks ────────────────────────────────────────────────────────────────────
function getTime(tz) {
  try {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false
    }).formatToParts(new Date());
    const h = parts.find(p => p.type === 'hour').value;
    const m = parts.find(p => p.type === 'minute').value;
    return `${h === '24' ? '00' : h}:${m}`;
  } catch { return '--:--'; }
}

function updateClocks() {
  document.getElementById('time-ca').textContent  = getTime('America/Los_Angeles');
  document.getElementById('time-rio').textContent = getTime('America/Sao_Paulo');
}

updateClocks();
setTimeout(function tick() {
  updateClocks();
  setTimeout(tick, (60 - new Date().getSeconds()) * 1000);
}, (60 - new Date().getSeconds()) * 1000);

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayLocal() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

function fmtDate(d) {
  const day = String(d.getDate()).padStart(2, '0');
  const mon = String(d.getMonth() + 1).padStart(2, '0');
  return `${DAY_PT[d.getDay()]}, ${day}/${mon}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Bills ─────────────────────────────────────────────────────────────────────
function nextDueDate(day) {
  const now = new Date(); now.setHours(0,0,0,0);
  const y = now.getFullYear(), m = now.getMonth();
  let d = new Date(y, m, day);
  if (d < now) d = new Date(y, m + 1, day);
  return d;
}

function billsSorted() {
  return [...bills]
    .map(b => ({ ...b, nextDate: nextDueDate(b.day) }))
    .sort((a, b) => a.nextDate - b.nextDate);
}

function renderBills() {
  const sorted = billsSorted();
  if (!sorted.length) {
    document.getElementById('bill-name-inline').textContent = '';
    document.getElementById('bill-date-display').textContent = '—';
    return;
  }
  const next = sorted[0];
  document.getElementById('bill-name-inline').textContent = '· ' + next.name;
  document.getElementById('bill-date-display').textContent = fmtDate(next.nextDate);
}

function renderBillsModal() {
  const list = document.getElementById('bills-list-modal');
  if (!bills.length) {
    list.innerHTML = '<p style="color:#c7c7cc;font-size:13px;text-align:center;padding:8px 0">Nenhuma conta cadastrada</p>';
    return;
  }
  list.innerHTML = billsSorted().map(b => {
    const idx = bills.findIndex(x => x.name === b.name && x.day === b.day);
    return `<div class="bill-item">
      <div class="bill-item-left">
        <div class="bill-item-name">${escHtml(b.name)}</div>
        <div class="bill-item-day">Todo dia ${b.day} · próx. ${fmtDate(b.nextDate)}</div>
      </div>
      <button class="bill-delete" onclick="deleteBill(${idx})">×</button>
    </div>`;
  }).join('');
}

function addBill() {
  const name = document.getElementById('new-bill-name').value.trim();
  const day  = parseInt(document.getElementById('new-bill-day').value);
  if (!name || isNaN(day) || day < 1 || day > 31) return;
  bills.push({ name, day });
  save('bills', bills);
  document.getElementById('new-bill-name').value = '';
  document.getElementById('new-bill-day').value  = '';
  renderBills();
  renderBillsModal();
}

function deleteBill(i) {
  bills.splice(i, 1);
  save('bills', bills);
  renderBills();
  renderBillsModal();
}

// ── Trackers ──────────────────────────────────────────────────────────────────
function nextTrackerDate(key) {
  const last = trackers[key];
  if (!last) return null;
  const d = new Date(last + 'T00:00:00');
  d.setDate(d.getDate() + TRACKER_INTERVAL[key]);
  return d;
}

function renderTracker(key) {
  const next    = nextTrackerDate(key);
  const dateEl  = document.getElementById(key + '-date-display');
  const subEl   = document.getElementById(key + '-sub');

  if (!next) {
    dateEl.textContent = '—';
    subEl.textContent  = 'Sem registro';
    return;
  }

  dateEl.textContent = fmtDate(next);

  const now  = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((next - now) / 86400000);

  if      (diff < 0)  subEl.textContent = `Atrasado ${Math.abs(diff)} dia${Math.abs(diff) !== 1 ? 's' : ''}`;
  else if (diff === 0) subEl.textContent = 'Hoje!';
  else                subEl.textContent = `Em ${diff} dia${diff !== 1 ? 's' : ''}`;
}

function markTrackerToday() {
  const key = document.getElementById('modal-tracker').dataset.key;
  trackers[key] = todayLocal();
  save('trackers', trackers);
  renderTracker(key);
  closeModal();
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openBillsModal() {
  renderBillsModal();
  document.getElementById('modal-bills').classList.add('open');
}

function openTrackerModal(key) {
  const modal = document.getElementById('modal-tracker');
  modal.dataset.key = key;
  const labels = { plants: '🪴 Regou as plantas hoje?', candle: '🕯️ Acendeu a vela hoje?' };
  const btns   = { plants: '💧 Sim, reguei agora', candle: '🔥 Sim, acendi agora' };
  document.getElementById('tracker-modal-title').textContent = labels[key];
  document.getElementById('tracker-mark-btn').textContent    = btns[key];
  modal.classList.add('open');
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
}

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) closeModal(); });
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderBills();
renderTracker('plants');
renderTracker('candle');
</script>
</body>
</html>
